<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portfólio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      background-color: #222;
      color: white;
      padding: 30px;
      text-align: center;
    }
    section {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    .projeto {
      background: white;
      margin: 20px 0;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .projeto h2 {
      margin-top: 0;
    }
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Portfólio</h1>
    <p>Meus trabalhos e projetos</p>
  </header>

  <section id="projetos">
    <h2>Meus Arquivos</h2>

    <div class="projeto">
      <h2>Projeto 1</h2>
      <p>Arquivo PDF</p>
      <a href="meu_arquivo/trabalho1.pdf" target="_blank">Abrir</a>
    </div>

    <div class="projeto">
      <h2>Projeto 2</h2>
      <p>Imagem do projeto</p>
      <img src="meu_arquivo/imagem1.jpg" alt="Imagem do projeto" width="300">
    </div>

    <div class="projeto">
      <h2>Projeto 3</h2>
      <p>Apresentação</p>
      <a href="meu_arquivo/apresentacao.pptx" target="_blank">Download</a>
    </div>
  </section>

  <footer>
    <p>© 2026 - Todos os direitos reservados</p>
  </footer>
</body>
</html>
