<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portfólio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      background-color: #222;
      color: white;
      padding: 30px;
      text-align: center;
      animation: fadeInDown 1.5s ease;
    }
    header h1 {
      margin: 0;
    }
    section {
      padding: 20px;
      max-width: 900px;
      margin: auto;
      animation: fadeIn 2s ease;
    }
    .projeto {
      background: white;
      margin: 20px 0;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: slideUp 1.2s ease;
    }
    .projeto:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }
    .projeto h2 {
      margin-top: 0;
    }
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
      animation: fadeInUp 1.5s ease;
    }

    /* Animações */
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    @keyframes fadeInDown {
      from {opacity: 0; transform: translateY(-30px);}
      to {opacity: 1; transform: translateY(0);}
    }
    @keyframes fadeInUp {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }
    @keyframes slideUp {
      from {opacity: 0; transform: translateY(50px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <header>
    <h1>Portfólio</h1>
    <p>Meus trabalhos e projetos</p>
  </header>

  <section id="projetos">
    <h2>Meus Arquivos</h2>

    <div class="projeto">
      <h2>Projeto 1</h2>
      <p>Arquivo PDF</p>
      <a href="meu_arquivo/trabalho1.pdf" target="_blank">Abrir</a>
    </div>

    <div class="projeto">
      <h2>Projeto 2</h2>
      <p>Imagem do projeto</p>
      <img src="meu_arquivo/imagem1.jpg" alt="Imagem do projeto" width="300">
    </div>

    <div class="projeto">
      <h2>Projeto 3</h2>
      <p>Apresentação</p>
      <a href="meu_arquivo/apresentacao.pptx" target="_blank">Download</a>
    </div>
  </section>

  <footer>
    <p>© 2026 - Todos os direitos reservados</p>
  </footer>
</body>
</html>
