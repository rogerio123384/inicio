<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Explorador de Arquivos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
      text-align: center;
      animation: fadeIn 2s ease-in-out;
    }
    h2 {
      color: #2980b9;
      margin-top: 20px;
      transition: transform 0.3s ease, color 0.3s ease;
    }
    h2:hover {
      transform: translateX(10px);
      color: #e67e22;
    }
    ul {
      list-style: none;
      padding-left: 20px;
      animation: slideIn 1s ease-in-out;
    }
    li {
      margin: 5px 0;
      padding: 5px;
      background: #ecf0f1;
      border-radius: 5px;
      transition: background 0.3s ease, transform 0.3s ease;
    }
    li:hover {
      background: #d1f7c4;
      transform: scale(1.05);
    }

    /* Animações */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>Meu Explorador de Arquivos</h1>

  <h2>📁 Pasta 1</h2>
  <ul>
    <li>📄 arquivo1.txt</li>
    <li>📄 arquivo2.docx</li>
  </ul>

  <h2>📁 Pasta 2</h2>
  <ul>
    <li>📄 foto.png</li>
    <li>📄 musica.mp3</li>
  </ul>

  <h2>📁 Projetos</h2>
  <ul>
    <li>📄 site.html</li>
    <li>📄 estilo.css</li>
    <li>📄 script.js</li>
  </ul>
</body>
</html>
