<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Explorador de Arquivos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }
    .folder {
      margin: 10px 0;
    }
    .folder > .name {
      font-weight: bold;
      cursor: pointer;
      color: #2c3e50;
    }
    .files {
      margin-left: 20px;
      display: none;
    }
    .file {
      margin: 5px 0;
      color: #34495e;
    }
  </style>
  <script>
    function toggleFolder(id) {
      const files = document.getElementById(id);
      files.style.display = files.style.display === "none" ? "block" : "none";
    }
  </script>
</head>
<body>
  <h1>Meu Explorador de Arquivos</h1>

  <div class="folder">
    <div class="name" onclick="toggleFolder('pasta1')">📁 Pasta 1</div>
    <div class="files" id="pasta1">
      <div class="file">📄 arquivo1.txt</div>
      <div class="file">📄 arquivo2.docx</div>
    </div>
  </div>

  <div class="folder">
    <div class="name" onclick="toggleFolder('pasta2')">📁 Pasta 2</div>
    <div class="files" id="pasta2">
      <div class="file">📄 foto.png</div>
      <div class="file">📄 musica.mp3</div>
    </div>
  </div>
</body>
</html>
